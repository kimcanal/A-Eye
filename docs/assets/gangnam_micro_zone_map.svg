    <rect x="118" y="184" width="320" height="210" rx="28" fill="#c5944b" fill-opacity="0.18" stroke="#8b5e22" stroke-width="3"/>
    <rect x="454" y="184" width="240" height="210" rx="28" fill="#4ea7d8" fill-opacity="0.18" stroke="#2d6f95" stroke-width="3"/>
    <rect x="706" y="184" width="286" height="210" rx="28" fill="#c5944b" fill-opacity="0.18" stroke="#8b5e22" stroke-width="3"/>

    <rect x="118" y="372" width="320" height="170" rx="28" fill="#c5944b" fill-opacity="0.18" stroke="#8b5e22" stroke-width="3"/>
    <rect x="454" y="356" width="336" height="202" rx="30" fill="#f7b500" fill-opacity="0.26" stroke="#a66b00" stroke-width="4"/>
    <rect x="806" y="372" width="278" height="170" rx="28" fill="#c5944b" fill-opacity="0.18" stroke="#8b5e22" stroke-width="3"/>

    <rect x="118" y="542" width="320" height="210" rx="28" fill="#c5944b" fill-opacity="0.18" stroke="#8b5e22" stroke-width="3"/>
    <rect x="454" y="542" width="240" height="210" rx="28" fill="#4ea7d8" fill-opacity="0.18" stroke="#2d6f95" stroke-width="3"/>
    <rect x="706" y="542" width="286" height="210" rx="28" fill="#c5944b" fill-opacity="0.18" stroke="#8b5e22" stroke-width="3"/>

    <!-- labels -->
    <text x="148" y="232" font-size="30" font-weight="700" fill="#5d3f17">A1</text>
    <text x="148" y="266" font-size="18" fill="#5d3f17">NW side streets</text>
    <text x="148" y="292" font-size="18" fill="#5d3f17">Seocho-side inflow</text>

    <text x="484" y="232" font-size="30" font-weight="700" fill="#1e5e82">A2</text>
    <text x="484" y="266" font-size="18" fill="#1e5e82">North exits</text>
    <text x="484" y="292" font-size="18" fill="#1e5e82">north curbside</text>

    <text x="736" y="232" font-size="30" font-weight="700" fill="#5d3f17">A3</text>
    <text x="736" y="266" font-size="18" fill="#5d3f17">Teheran-ro offices</text>
    <text x="736" y="292" font-size="18" fill="#5d3f17">north-east frontage</text>

    <text x="148" y="420" font-size="30" font-weight="700" fill="#5d3f17">B1</text>
    <text x="148" y="454" font-size="18" fill="#5d3f17">West frontage</text>
    <text x="148" y="480" font-size="18" fill="#5d3f17">crossing inflow</text>

    <text x="484" y="412" font-size="34" font-weight="700" fill="#8a5200">B2</text>
    <text x="484" y="448" font-size="20" font-weight="700" fill="#8a5200">Gangnam Station core hotspot</text>
    <text x="484" y="478" font-size="18" fill="#8a5200">main dispatch priority</text>
    <circle cx="752" cy="392" r="16" fill="#ef4444"/>
    <text x="752" y="398" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">★</text>

    <text x="836" y="420" font-size="30" font-weight="700" fill="#5d3f17">B3</text>
    <text x="836" y="454" font-size="18" fill="#5d3f17">East frontage</text>
    <text x="836" y="480" font-size="18" fill="#5d3f17">pickup belt</text>

    <text x="148" y="590" font-size="30" font-weight="700" fill="#5d3f17">C1</text>
    <text x="148" y="624" font-size="18" fill="#5d3f17">South-west belt</text>
    <text x="148" y="650" font-size="18" fill="#5d3f17">commercial flow</text>

    <text x="484" y="590" font-size="30" font-weight="700" fill="#1e5e82">C2</text>
    <text x="484" y="624" font-size="18" fill="#1e5e82">South exits</text>
    <text x="484" y="650" font-size="18" fill="#1e5e82">south curbside</text>

    <text x="736" y="590" font-size="30" font-weight="700" fill="#5d3f17">C3</text>
    <text x="736" y="624" font-size="18" fill="#5d3f17">South-east belt</text>
    <text x="736" y="650" font-size="18" fill="#5d3f17">connector demand</text>
  </g>

  <!-- station + road labels -->
  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="575" y="585" width="230" height="56" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <circle cx="612" cy="613" r="14" fill="#16a34a"/>
    <text x="612" y="619" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">2</text>
    <text x="642" y="620" font-size="24" font-weight="700" fill="#111827">Gangnam Station</text>

    <text x="806" y="163" font-size="24" font-weight="700" fill="#374151">Gangnam-daero</text>
    <text x="1170" y="380" font-size="24" font-weight="700" fill="#374151">Teheran-ro</text>
    <text x="154" y="248" font-size="16" fill="#6b7280">Seocho-side</text>
    <text x="1078" y="248" font-size="16" fill="#6b7280">Yeoksam-side</text>
  </g>

  <!-- footer -->
  <rect x="110" y="790" width="1180" height="42" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="140" y="818" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#1f2937">Recommended priority: B2 → A2 / B3 / C2 → surrounding support zones</text>
</svg>
