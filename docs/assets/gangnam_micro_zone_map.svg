<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1400" height="920" fill="#efe8dc"/>

  <rect x="0" y="0" width="1400" height="110" fill="#18212b"/>
  <text x="56" y="64" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">Gangnam Station Micro Scope</text>
  <text x="56" y="94" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#d2dae3">Schematic 2D map for prediction, dispatch, Unity, and SUMO around Gangnam Station</text>

  <rect x="70" y="150" width="1260" height="700" rx="28" fill="#f8f5ef" stroke="#d2c5b1" stroke-width="3"/>

  <!-- city blocks -->
  <g filter="url(#shadow)">
    <rect x="130" y="220" width="255" height="145" rx="18" fill="#ddd3c0"/>
    <rect x="455" y="210" width="195" height="155" rx="18" fill="#d8cfbf"/>
    <rect x="755" y="220" width="235" height="145" rx="18" fill="#ddd3c0"/>
    <rect x="1045" y="225" width="185" height="140" rx="18" fill="#d8cfbf"/>

    <rect x="125" y="500" width="260" height="165" rx="18" fill="#ddd3c0"/>
    <rect x="445" y="510" width="215" height="155" rx="18" fill="#d8cfbf"/>
    <rect x="750" y="505" width="240" height="160" rx="18" fill="#ddd3c0"/>
    <rect x="1045" y="500" width="185" height="160" rx="18" fill="#d8cfbf"/>
  </g>

  <!-- main roads -->
  <rect x="600" y="170" width="180" height="660" rx="26" fill="#4a5563"/>
  <rect x="90" y="392" width="1240" height="160" rx="24" fill="#4a5563"/>

  <!-- side roads -->
  <rect x="252" y="170" width="78" height="660" rx="18" fill="#6b7280"/>
  <rect x="1070" y="170" width="78" height="660" rx="18" fill="#6b7280"/>
  <rect x="90" y="255" width="1240" height="62" rx="16" fill="#6b7280"/>
  <rect x="90" y="675" width="1240" height="62" rx="16" fill="#6b7280"/>

  <!-- lane lines -->
  <g stroke="#ffffff" stroke-width="5" stroke-dasharray="20 14" opacity="0.92">
    <line x1="690" y1="182" x2="690" y2="818"/>
    <line x1="280" y1="182" x2="280" y2="818"/>
    <line x1="1108" y1="182" x2="1108" y2="818"/>
    <line x1="102" y1="472" x2="1318" y2="472"/>
    <line x1="102" y1="286" x2="1318" y2="286"/>
    <line x1="102" y1="706" x2="1318" y2="706"/>
  </g>

  <!-- crosswalks -->
  <g fill="#f8fafc">
    <rect x="562" y="357" width="28" height="40" rx="4"/>
    <rect x="562" y="401" width="28" height="40" rx="4"/>
    <rect x="562" y="445" width="28" height="40" rx="4"/>
    <rect x="562" y="489" width="28" height="40" rx="4"/>
    <rect x="790" y="357" width="28" height="40" rx="4"/>
    <rect x="790" y="401" width="28" height="40" rx="4"/>
    <rect x="790" y="445" width="28" height="40" rx="4"/>
    <rect x="790" y="489" width="28" height="40" rx="4"/>

    <rect x="532" y="352" width="42" height="26" rx="4"/>
    <rect x="488" y="352" width="42" height="26" rx="4"/>
    <rect x="444" y="352" width="42" height="26" rx="4"/>
    <rect x="400" y="352" width="42" height="26" rx="4"/>
    <rect x="836" y="352" width="42" height="26" rx="4"/>
    <rect x="880" y="352" width="42" height="26" rx="4"/>
    <rect x="924" y="352" width="42" height="26" rx="4"/>
    <rect x="968" y="352" width="42" height="26" rx="4"/>

    <rect x="532" y="566" width="42" height="26" rx="4"/>
    <rect x="488" y="566" width="42" height="26" rx="4"/>
    <rect x="444" y="566" width="42" height="26" rx="4"/>
    <rect x="400" y="566" width="42" height="26" rx="4"/>
    <rect x="836" y="566" width="42" height="26" rx="4"/>
    <rect x="880" y="566" width="42" height="26" rx="4"/>
    <rect x="924" y="566" width="42" height="26" rx="4"/>
    <rect x="968" y="566" width="42" height="26" rx="4"/>
