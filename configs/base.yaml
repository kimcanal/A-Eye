data:
  input_csv: data/local_taxi_calls.csv
  processed_csv: outputs/local/processed_taxi_calls.csv
  time_column: pickup_datetime
  zone_column: zone_id
  demand_column: call_count
  supply_column: available_taxis

features:
  use_hour: true
  use_day_of_week: true
  use_lag_1: true
  use_rolling_mean_3: true
  use_weather: true
  use_holiday: true

model:
  name: random_forest
  test_size: 0.2
  random_state: 42
  n_estimators: 200
  metrics_output: outputs/local/model_metrics.json
  predictions_output: outputs/local/predictions.csv

dispatch:
  low_threshold: 1.2
  medium_threshold: 1.5
  high_threshold: 2.0
  output_csv: outputs/local/dispatch_recommendations.csv

analysis:
  zone_summary_output: outputs/local/zone_demand_summary.csv
  hour_summary_output: outputs/local/hourly_demand_summary.csv
  dispatch_eval_output: outputs/local/dispatch_evaluation.json
  dispatch_comparison_output: outputs/local/dispatch_comparison.csv

visualization:
  hourly_output: outputs/local/hourly_demand.png
  heatmap_output: outputs/local/zone_hour_heatmap.png
  prediction_plot_output: outputs/local/actual_vs_predicted.png
  dispatch_eval_plot_output: outputs/local/dispatch_before_after.png

lstm:
  seq_len: 6
  hidden_size: 32
  num_layers: 1
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  metrics_output: outputs/local/lstm_metrics.json
  predictions_output: outputs/local/lstm_predictions.csv

grid:
  width: 3
  height: 3
  output_csv: outputs/local/grid_3x3_demand.csv

convlstm:
  seq_len: 6
  hidden_dim: 16
  kernel_size: 3
  epochs: 50
  batch_size: 16
  learning_rate: 0.001
  metrics_output: outputs/local/convlstm_metrics.json
  predictions_output: outputs/local/convlstm_predictions.csv
